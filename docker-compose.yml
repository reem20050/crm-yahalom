version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crm-postgres-dev
    environment:
      POSTGRES_USER: crmuser
      POSTGRES_PASSWORD: crmpass
      POSTGRES_DB: crm_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crmuser"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
