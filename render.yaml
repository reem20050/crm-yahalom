# Render.com deployment configuration
databases:
  - name: crm-yahalom-db
    plan: free
    databaseName: crm_yahalom
    user: crm_user
    region: frankfurt

services:
  # Main CRM application (frontend + backend)
  - type: web
    name: crm-yahalom
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crm-yahalom-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: TZ
        value: Asia/Jerusalem
      - key: WAHA_API_URL
        value: https://crm-yahalom-waha.onrender.com
      - key: WAHA_WEBHOOK_URL
        value: https://crm-yahalom.onrender.com/api/integrations/whatsapp/webhook

  # WAHA - WhatsApp HTTP API (self-hosted WhatsApp bridge)
  - type: web
    name: crm-yahalom-waha
    env: docker
    dockerfilePath: ./Dockerfile.waha
    dockerContext: .
    plan: free
    region: frankfurt
    envVars:
      - key: WHATSAPP_DEFAULT_ENGINE
        value: NOWEB
      - key: WHATSAPP_RESTART_ALL_SESSIONS
        value: "true"
      - key: WAHA_WORKER_THREADS
        value: "1"
